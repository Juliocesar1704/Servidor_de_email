services:

  # --- PROXY REVERSO DEDICADO ---
  proxy-server:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    image: nexustech-proxy
    container_name: p001-proxy-server
    ports:
      - "80:80"
    networks:
      - nexustech-network
    restart: always
    depends_on:
      - web-main
      - web-portal
      - web-suporte

  # --- SITE PRINCIPAL ---
  web-main:
    build:
      context: ./web/site-main
      dockerfile: Dockerfile
    image: nexustech-web-main
    container_name: c001-web-main
    networks:
      - nexustech-network
    restart: always

  # --- PORTAL ---
  web-portal:
    build:
      context: ./web/site-portal
      dockerfile: Dockerfile
    image: nexustech-web-portal
    container_name: c002-web-portal
    networks:
      - nexustech-network
    restart: always

  # --- SUPORTE ---
  web-suporte:
    build:
      context: ./web/site-suporte
      dockerfile: Dockerfile
    image: nexustech-web-suporte
    container_name: c003-web-suporte
    networks:
      - nexustech-network
    restart: always

  # --- SERVIÇO DE DNS (BIND9) ---
  dns-server:
    build:
      context: ./dns
      dockerfile: Dockerfile
    image: nexustech-dns
    container_name: d001-dns-server
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./dns/named.conf.local:/etc/bind/named.conf.local
      - ./dns/nexustech.com.br:/etc/bind/nexustech.com.br
    networks:
      - nexustech-network
    restart: always

  # --- SERVIÇO DE E-MAIL (POSTFIX + DOVECOT) ---
  mail-server:
    build:
      context: ./mail
      dockerfile: Dockerfile
    image: nexustech-mail
    container_name: m001-mail-server
    ports:
      - "25:25"
      - "587:587"
      - "143:143"
      - "993:993"
      - "110:110"
      - "995:995"
    volumes:
      - mail_data:/home
    networks:
      - nexustech-network
    restart: always

networks:
  nexustech-network:
    driver: bridge

volumes:
  mail_data: